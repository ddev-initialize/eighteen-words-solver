name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          name="eighteen-words-solver-${GOOS}-${GOARCH}"
          binary="eighteen-words-solver"
          if [ "$GOOS" = "windows" ]; then binary="${binary}.exe"; fi

          mkdir -p "stage/$name" dist
          go build -trimpath -ldflags="-s -w" -o "stage/$name/$binary" ./cmd/eighteen-words-solver
          cp LICENSE README.md "stage/$name/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd "stage/$name" && zip -q -r "../../dist/$name.zip" .)
          else
            tar -C "stage/$name" -czf "dist/$name.tar.gz" .
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: eighteen-words-solver-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: (cd dist && sha256sum * > checksums.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
